name: tests

on:
  push:
  pull_request:

jobs:
  package-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e packages/yandex-agent-tools[dev]
      - name: Run yandex-agent-tools tests
        run: python -m pytest packages/yandex-agent-tools/tests -q
      - name: Run public safety scan
        run: python tools/public_safety_scan.py . --strict
