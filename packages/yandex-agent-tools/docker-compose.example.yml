services:
  yandex-agent-tools:
    build: .
    container_name: yandex-agent-tools-reference
    restart: unless-stopped
    env_file:
      - runtime.env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
